<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
    <title vid="4">Nostalgic Photo Album</title>
    
    <style vid="5">
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            
            --parchment: #fdfaf3;
            --sepia-dark: #4a3728;
            --gold-light: #f4e4bc;
            --gold-warm: #d4a373;
            --warm-shadow: #2c1e14;
            
            
            --font-serif: 'Playfair Display', serif;
            --font-body: 'Libre+Baskerville', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1410;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: var(--font-body);
            color: var(--sepia-dark);
        }

        .paper-texture {
            position: relative;
        }
        .paper-texture::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
        }

        .camera-app {
            width: 402px;
            height: 874px;
            background: var(--parchment);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            border-radius: 55px;
            overflow: hidden;
        }

        
        .top-plate {
            padding: 60px 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .engraved-text {
            font-family: var(--font-serif);
            font-size: 18px;
            font-style: italic;
            font-weight: 700;
            color: var(--sepia-dark);
        }

        .small-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gold-light);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1), inset -1px -1px 2px rgba(255,255,255,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .small-button svg {
            width: 20px;
            height: 20px;
            stroke: var(--sepia-dark);
            stroke-width: 1.5;
            fill: none;
        }

        
        .viewfinder-assembly {
            flex: 1;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .viewfinder-bezel {
            aspect-ratio: 4/5;
            background: white;
            padding: 12px 12px 48px 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            transform: rotate(-1deg);
            position: relative;
        }

        .viewfinder-glass {
            width: 100%;
            height: 100%;
            background-color: #eee;
            position: relative;
            overflow: hidden;
        }

        .viewfinder-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.2) saturate(0.8) contrast(0.9);
        }

        
        .vignette {
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.4);
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        
        .hud-overlay {
            position: absolute;
            bottom: -36px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            font-family: var(--font-serif);
            font-size: 12px;
            color: rgba(74, 55, 40, 0.6);
            letter-spacing: 0.5px;
        }

        
        .film-strip-container {
            margin: 20px 0;
            padding: 10px 0;
            background: #1a1410;
            display: flex;
            gap: 8px;
            overflow: hidden;
            position: relative;
        }
        .film-strip-container::before, .film-strip-container::after {
            content: '';
            position: absolute;
            top: 4px; bottom: 4px; left: 0; right: 0;
            border-top: 4px dashed rgba(255,255,255,0.2);
            border-bottom: 4px dashed rgba(255,255,255,0.2);
        }

        .film-frame {
            width: 80px;
            height: 60px;
            background: #333;
            flex-shrink: 0;
            opacity: 0.6;
            filter: grayscale(1);
        }
        .film-frame.active {
            opacity: 1;
            filter: grayscale(0) sepia(0.3);
            border: 2px solid var(--gold-warm);
        }

        
        .control-deck {
            padding: 20px 30px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        
        .shutter-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--gold-light), var(--gold-warm));
            border: 4px solid var(--parchment);
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.1),
                inset 0 -4px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .shutter-btn:active {
            transform: scale(0.92);
        }
        .shutter-inner {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            background: var(--gold-warm);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
        }

        
        .lens-badge {
            font-family: var(--font-serif);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            border-bottom: 1px solid var(--sepia-dark);
            padding-bottom: 2px;
        }

    </style>
</head>
<body vid="6">

    <div class="camera-app paper-texture" vid="7">
        
        <header class="top-plate" vid="8">
            <div class="small-button" vid="9">
                <svg viewBox="0 0 24 24" vid="10"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" vid="11"></path></svg>
            </div>
            <div class="engraved-text" vid="12">Golden Hour Memories</div>
            <div class="small-button" vid="13">
                <svg viewBox="0 0 24 24" vid="14"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-linecap="round" vid="15"></path></svg>
            </div>
        </header>

        <main class="viewfinder-assembly" vid="16">
            <div class="viewfinder-bezel" vid="17">
                <div class="viewfinder-glass" vid="18">
                    <img src="https://images.pexels.com/photos/3560044/pexels-photo-3560044.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=800&amp;h=800&amp;fit=crop" class="viewfinder-image" alt="Cinematic view" vid="19">
                    <div class="vignette" vid="20"></div>

                <div class="hud-overlay" vid="21">
                    <span vid="22">AUG 1974</span>

                </div>
            </div>
        </main>

        
        <div class="film-strip-container" vid="24">
            <div class="film-frame" vid="25"></div>
            <div class="film-frame" vid="26"></div>
            <div class="film-frame active" vid="27" style="background-image: url('https://images.pexels.com/photos/3560044/pexels-photo-3560044.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=100&amp;fit=crop'); background-size: cover;"></div>
            <div class="film-frame" vid="28"></div>
            <div class="film-frame" vid="29"></div>
        </div>

        <section class="control-deck" vid="30">
            <div class="shutter-btn" vid="31">
                <div class="shutter-inner" vid="32"></div>
            </div>
            
            <div class="lens-badge" vid="33">
                Summilux 35mm f/1.4
            </div>
        </section>

    </div>


</body></html>
